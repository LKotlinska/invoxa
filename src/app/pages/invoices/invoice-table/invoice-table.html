<table mat-table [dataSource]="(invoices$ | async) ?? []" class="mat-elevation-z8 invoice-table">
  <ng-container matColumnDef="invoice_number">
    <th mat-header-cell *matHeaderCellDef>Invoice #</th>
    <td mat-cell *matCellDef="let element">{{ element.invoice_number }}</td>
  </ng-container>

  <ng-container matColumnDef="customers">
    <th mat-header-cell *matHeaderCellDef>Customer</th>
    <td mat-cell *matCellDef="let element">{{ element.customers }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let element">{{ element.status }}</td>
  </ng-container>

  <ng-container matColumnDef="due_date">
    <th mat-header-cell *matHeaderCellDef>Due Date</th>
    <td mat-cell *matCellDef="let element">{{ element.due_date }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns()"></tr>
</table>
